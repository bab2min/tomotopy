name: Publish new package into test pypi

on:
  push:
    tags:
      - 'v*.*.*d'

jobs:
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    container:
      image: docker://quay.io/pypa/manylinux_2_28_x86_64

    steps:
    - uses: actions/checkout@v4
    - name: Build sdist
      run: |
        /opt/python/cp313-cp313/bin/python -m pip install build scikit-build-core numpy
        /opt/python/cp313-cp313/bin/python -m build --sdist
    - name: Upload sdist
      uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: dist/*.tar.gz

  build_manylinux:
    name: Build for manylinux
    runs-on: ubuntu-latest
    container:
      image: docker://quay.io/pypa/manylinux_2_28_x86_64

    steps:
    - uses: actions/checkout@v4
    - name: Build wheel
      run: |
        /opt/python/cp313-cp313/bin/python -m pip install scikit-build-core numpy
        /opt/python/cp313-cp313/bin/python -m pip wheel . -w dist --no-build-isolation --no-deps
        auditwheel repair dist/*.whl -w wheelhouse
    - name: Upload wheel
      uses: actions/upload-artifact@v4
      with:
        name: wheel-manylinux-x86_64
        path: wheelhouse/*.whl

  build_linux_arm64:
    name: Build for linux arm64
    runs-on: ubuntu-24.04-arm
    container:
      image: docker://quay.io/pypa/manylinux_2_28_aarch64

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        lfs: true
    - name: Build wheel
      run: |
          /opt/python/cp313-cp313/bin/python -m pip install scikit-build-core numpy
          /opt/python/cp313-cp313/bin/python -m pip wheel . -w dist --no-build-isolation --no-deps
          auditwheel repair dist/*.whl -w wheelhouse
    - name: Upload wheel
      uses: actions/upload-artifact@v4
      with:
        name: wheel-manylinux-aarch64
        path: wheelhouse/*.whl

  build_macos_intel:
    name: Build for macOS Intel
    runs-on: macos-15-intel

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Build wheel
      run: |
        export MACOSX_DEPLOYMENT_TARGET=10.14
        python -m pip install --upgrade pip
        python -m pip install scikit-build-core numpy
        export AUDITWHEEL_PLAT=many
        python -m pip wheel . -w dist --no-build-isolation --no-deps
    - name: Upload wheel
      uses: actions/upload-artifact@v4
      with:
        name: wheel-macos-x86_64
        path: dist/*.whl

  build_macos:
    name: Build for macOS Arm64
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Build wheel
      run: |
        export MACOSX_DEPLOYMENT_TARGET=10.14
        python -m pip install --upgrade pip
        python -m pip install scikit-build-core numpy
        export CMAKE_OSX_ARCHITECTURES=arm64
        export _PYTHON_HOST_PLATFORM="macosx-11.0-arm64"
        export ARCHFLAGS="-arch arm64"
        python -m pip wheel . -w dist --no-build-isolation --no-deps \
          -C cmake.define.TARGET_ARCH=arm64 \
          -C cmake.define.TOMOTOPY_ISA=arm64 \
          -C cmake.define.BUILD_MULTI_ARCH=OFF
    - name: Upload wheel
      uses: actions/upload-artifact@v4
      with:
        name: wheel-macos-arm64
        path: dist/*.whl

  build_windows:
    name: Build for Windows (${{ matrix.architecture }})
    runs-on: windows-latest
    strategy:
      matrix:
        architecture: [x86, x64]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.13 ${{ matrix.architecture }}
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        architecture: ${{ matrix.architecture }}
    - name: Build wheel
      run: |
        python -m pip install --upgrade pip
        python -m pip install scikit-build-core numpy
        python -m pip wheel . -w dist --no-build-isolation --no-deps
    - name: Upload wheel
      uses: actions/upload-artifact@v4
      with:
        name: wheel-windows-${{ matrix.architecture }}
        path: dist/*.whl

  publish:
    name: Publish to Test PyPI
    needs: [build_sdist, build_manylinux, build_linux_arm64, build_macos_intel, build_macos, build_windows]
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true
    - name: Publish to Test PyPI
      env:
        TWINE_USERNAME: ${{ secrets.TEST_PYPI_USERNAME }}
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_PASSWORD }}
      run: |
        pip install twine
        twine upload --repository testpypi dist/*
